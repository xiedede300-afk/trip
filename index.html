<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TripSync - 旅遊行程規劃 v2</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Framer Motion for Reordering -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- LZ-String for URL compression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .animate-in {
            animation: fadeIn 0.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .content-padding {
            padding-bottom: calc(140px + var(--sab));
        }

        /* 時間軸線條 */
        .timeline-line {
            position: absolute;
            left: 28px;
            top: 28px;
            bottom: 60px;
            width: 2px;
            background: #e2e8f0;
            z-index: 0;
        }

        @media (max-width: 640px) {
            .timeline-line {
                left: 22px;
                bottom: 50px;
            }
        }

        .category-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1.25rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
            z-index: 200;
            padding: 8px;
            min-width: 140px;
        }

        .transport-popover {
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 10px;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
            display: flex;
            gap: 4px;
            padding: 6px;
            z-index: 50;
        }

        .elevated-card {
            z-index: 9999 !important;
        }

        .add-card-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .add-card-btn:hover {
            border-color: #6366f1;
            background-color: #f5f3ff;
            transform: translateY(-2px);
        }

        .drag-handle {
            cursor: grab;
        }

        .drag-handle:active {
            cursor: grabbing;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useLayoutEffect } = React;
        const { motion, Reorder, useDragControls } = window.Motion;

        const categories = [
            { id: 'attraction', label: '景點', icon: 'camera', bg: 'bg-violet-50', text: 'text-violet-600' },
            { id: 'food', label: '餐飲', icon: 'utensils', bg: 'bg-rose-50', text: 'text-rose-600' },
            { id: 'hotel', label: '住宿', icon: 'bed', bg: 'bg-sky-50', text: 'text-sky-600' },
            { id: 'transport', label: '交通', icon: 'bus', bg: 'bg-amber-50', text: 'text-amber-600' },
            { id: 'shopping', label: '購物', icon: 'shopping-bag', bg: 'bg-fuchsia-50', text: 'text-fuchsia-600' },
            { id: 'other', label: '其他', icon: 'tag', bg: 'bg-slate-50', text: 'text-slate-500' },
        ];

        const transportTypes = [
            { id: 'transit', label: '大眾運輸', icon: 'bus' },
            { id: 'walking', label: '步行', icon: 'footprints' },
            { id: 'driving', label: '開車', icon: 'car' },
            { id: 'bicycling', label: '自行車', icon: 'bike' },
        ];


        const Icon = ({ name, className = "w-4 h-4" }) => {
            const containerRef = useRef(null);

            useLayoutEffect(() => {
                if (containerRef.current && window.lucide) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide',
                        root: containerRef.current
                    });
                }
            }, [name, className]);

            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        const CategoryDropdown = ({ currentId, onSelect, onClose }) => (
            <div className="category-dropdown animate-in space-y-1">
                {categories.map(c => (
                    <button
                        key={c.id}
                        type="button"
                        onClick={(e) => {
                            e.stopPropagation();
                            onSelect(c.id);
                            onClose();
                        }}
                        className={`w-full px-3 py-2.5 rounded-xl flex items-center gap-3 text-[11px] font-bold transition-all ${currentId === c.id ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-50 text-slate-500'}`}
                    >
                        <Icon name={c.icon} className="w-3.5 h-3.5" />
                        <span>{c.label}</span>
                    </button>
                ))}
            </div>
        );


        const LocationItem = ({
            loc,
            index,
            nextLoc,
            openDropdownId,
            openTransportId,
            setOpenDropdownId,
            setOpenTransportId,
            updateLocation,
            removeLocation,
            setEditingTimeTarget,
            setEditingTransportTarget,
            getDirectionsUrl
        }) => {

            const dragControls = useDragControls();
            const cat = categories.find(c => c.id === loc.category) || categories[5];
            const currentTrans = transportTypes.find(t => t.id === loc.transportType) || transportTypes[0];
            const isDropdownOpen = openDropdownId === loc.id;

            return (
                <Reorder.Item
                    key={loc.id}
                    value={loc}
                    dragListener={false}
                    dragControls={dragControls}
                    className={`group relative ${(isDropdownOpen || openTransportId === loc.id) ? 'elevated-card' : 'z-10'}`}
                    initial={{ opacity: 0, y: 10 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, scale: 0.95 }}
                >
                    <div className={`flex gap-4 sm:gap-6 items-start relative ${isDropdownOpen ? 'z-50' : 'z-10'}`}>
                        <div className="flex flex-col items-center shrink-0">
                            <div className={`relative ${isDropdownOpen ? 'z-50' : 'z-10'}`}>
                                <div
                                    onPointerDown={(e) => dragControls.start(e)}
                                    onClick={() => setOpenDropdownId(isDropdownOpen ? null : loc.id)}
                                    className={`drag-handle w-11 h-11 sm:w-14 sm:h-14 rounded-xl sm:rounded-2xl ${cat.bg} ${cat.text} flex items-center justify-center border-2 sm:border-4 border-white shadow-sm transition-all active:scale-95 cursor-grab relative hover:brightness-95`}
                                >
                                    <Icon name={cat.icon} className="w-5 h-5 sm:w-6 sm:h-6" />
                                </div>

                                {isDropdownOpen && (
                                    <CategoryDropdown
                                        currentId={loc.category}
                                        onSelect={(val) => updateLocation(loc.id, 'category', val)}
                                        onClose={() => setOpenDropdownId(null)}
                                    />
                                )}

                            </div>

                            <button
                                onClick={() => setEditingTimeTarget({ id: loc.id, isBackup: false })}
                                className="bg-white h-6 px-2 rounded-full mt-2 shadow-sm border border-slate-100 hover:border-indigo-200 transition-all hover:shadow-md active:scale-95 group/time flex items-center justify-center"
                            >
                                <span className="text-[10px] sm:text-[11px] font-black text-slate-600 group-hover/time:text-indigo-600 leading-none">
                                    {loc.time || '--:--'}
                                </span>
                            </button>

                        </div>

                        <div className="flex-1 bg-white rounded-3xl border border-slate-100 p-4 sm:p-6 shadow-sm hover:shadow-md transition-shadow">
                            <div className="flex justify-between items-start gap-2 mb-3">
                                <div className="flex-1">
                                    <input
                                        className="text-base sm:text-lg font-black bg-transparent border-none p-0 focus:ring-0 text-slate-800 w-full mb-0.5"
                                        value={loc.name}
                                        placeholder="景點名稱..."
                                        onChange={(e) => updateLocation(loc.id, 'name', e.target.value)}
                                    />
                                    <div className="flex items-center gap-1.5 text-[10px] text-slate-400 font-bold">
                                        <Icon name="tag" className="w-3 h-3" />
                                        <span>{cat.label}</span>
                                    </div>
                                </div>
                                <button onClick={() => removeLocation(loc.id)} className="text-slate-200 hover:text-rose-500 p-1.5 transition-colors">
                                    <Icon name="trash-2" className="w-4 h-4" />
                                </button>
                            </div>
                            <div className="space-y-2.5">
                                <div className="flex items-center gap-2 text-[11px] text-slate-500 bg-slate-50 rounded-xl px-3 py-2 border border-slate-100">
                                    <Icon name="map-pin" className="w-3 h-3 text-slate-400 shrink-0" />
                                    <input className="bg-transparent border-none p-0 focus:ring-0 w-full font-medium" value={loc.mapUrl} placeholder="Google Map 分享連結..." onChange={(e) => updateLocation(loc.id, 'mapUrl', e.target.value)} />
                                </div>
                                {loc.note !== undefined && (
                                    <div className="flex items-start gap-2 text-[11px] text-slate-400 bg-amber-50/20 rounded-xl px-3 py-2 border border-amber-100/30">
                                        <Icon name="sticky-note" className="w-3 h-3 text-amber-500 mt-0.5 shrink-0" />
                                        <textarea className="bg-transparent border-none p-0 focus:ring-0 w-full resize-none font-medium" rows="1" value={loc.note} placeholder="行程備註..." onChange={(e) => updateLocation(loc.id, 'note', e.target.value)} />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {nextLoc && (
                        <div className="ml-14 sm:ml-20 my-4 sm:my-6 pl-0 relative z-10 flex items-center gap-3">
                            <div className="relative flex-1 max-w-xs">
                                <div className="flex items-center bg-white border border-slate-100 rounded-2xl p-1 shadow-sm">
                                    <button
                                        onClick={() => setOpenTransportId(openTransportId === loc.id ? null : loc.id)}
                                        className="w-10 h-10 rounded-xl bg-slate-50 text-slate-600 flex items-center justify-center hover:bg-slate-100 transition-colors active:scale-95"
                                    >
                                        <Icon name={currentTrans.icon} className="w-4 h-4" />
                                    </button>

                                    <div className="flex-1 px-3 flex items-center gap-2">
                                        <input
                                            className="bg-transparent border-none p-0 focus:ring-0 w-full text-[11px] font-bold text-slate-500"
                                            placeholder="交通資訊..."
                                            value={loc.transportDetail}
                                            onChange={(e) => updateLocation(loc.id, 'transportDetail', e.target.value)}
                                        />
                                        <button
                                            onClick={() => setEditingTransportTarget({ id: loc.id })}
                                            className="flex items-center gap-1 shrink-0 bg-indigo-50/50 px-2 py-1 rounded-lg hover:bg-indigo-100 transition-all active:scale-95"
                                        >
                                            <span className="text-[11px] font-black text-indigo-600">{loc.transportTime || 0}</span>
                                            <span className="text-[9px] font-black text-indigo-300">m</span>
                                        </button>
                                    </div>

                                    {openTransportId === loc.id && (
                                        <div className="transport-popover animate-in">
                                            {transportTypes.map(t => (
                                                <button
                                                    key={t.id}
                                                    onClick={() => { updateLocation(loc.id, 'transportType', t.id); setOpenTransportId(null); }}
                                                    className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${loc.transportType === t.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-50'}`}
                                                >
                                                    <Icon name={t.icon} className="w-4 h-4" />
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <a
                                href={getDirectionsUrl(loc.mapUrl, nextLoc.mapUrl, loc.transportType)}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="w-12 h-12 rounded-2xl bg-indigo-500 text-white flex items-center justify-center shadow-lg shadow-indigo-100 hover:bg-indigo-600 active:scale-95 transition-all shrink-0"
                            >
                                <Icon name="navigation" className="w-5 h-5" />
                            </a>
                        </div>
                    )}
                </Reorder.Item>
            );
        };

        const App = () => {
            // ── 從 URL hash 讀取分享資料（必須在所有 useState 之前）──
            const getSharedData = () => {
                const hash = window.location.hash.substring(1);
                if (hash && window.LZString) {
                    try {
                        const decompressed = window.LZString.decompressFromEncodedURIComponent(hash);
                        if (decompressed) return JSON.parse(decompressed);
                    } catch (e) { console.error('解析分享網址失敗', e); }
                }
                return null;
            };
            const _sharedData = getSharedData();

            const [activeTab, setActiveTab] = useState('itinerary');
            const [itinerarySubTab, setItinerarySubTab] = useState('main'); // 'main' 或 'backup'
            const [tripTitle, setTripTitle] = useState(() => _sharedData?.tripTitle || '我的夏季旅遊');
            const [selectedDay, setSelectedDay] = useState(1);
            const [isScrolled, setIsScrolled] = useState(false);
            const [focusedLocationId, setFocusedLocationId] = useState(null);
            const [openDropdownId, setOpenDropdownId] = useState(null);
            const [openTransportId, setOpenTransportId] = useState(null);
            const [editingDayId, setEditingDayId] = useState(null);

            const [editingTimeTarget, setEditingTimeTarget] = useState(null); // { id, isBackup }
            const [editingTransportTarget, setEditingTransportTarget] = useState(null); // { id }

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 10);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleShare = () => {
                if (!window.LZString) {
                    alert('分享功能載入中，請稍後再試。');
                    return;
                }
                const data = { itinerary, backupLocations, tripTitle };
                const compressed = window.LZString.compressToEncodedURIComponent(JSON.stringify(data));
                // 使用當前完整 URL（去掉舊 hash）確保 file:// 與 http:// 都能正確運作
                const baseUrl = window.location.href.split('#')[0];
                const url = `${baseUrl}#${compressed}`;
                window.history.replaceState(null, '', `#${compressed}`);
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url)
                        .then(() => alert('✅ 分享連結已複製！\n將此連結傳給朋友，他們即可開啟並共同編輯行程。'))
                        .catch(() => { prompt('請手動複製以下連結：', url); });
                } else {
                    prompt('請手動複製以下連結：', url);
                }
            };

            const startDate = new Date();
            const getDayInfo = (dayNumber) => {
                const targetDate = new Date(startDate);
                targetDate.setDate(startDate.getDate() + (dayNumber - 1));
                const weeks = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
                return {
                    year: targetDate.getFullYear(),
                    month: `${targetDate.getMonth() + 1}月`,
                    date: targetDate.getDate(),
                    week: weeks[targetDate.getDay()]
                };
            };

            const [itinerary, setItinerary] = useState(() => _sharedData?.itinerary || [
                {
                    id: 'd1',
                    day: 1,
                    year: getDayInfo(1).year,
                    month: getDayInfo(1).month,
                    date: getDayInfo(1).date,
                    week: getDayInfo(1).week,
                    locations: [
                        {
                            id: 'l1',
                            name: '成田國際機場',
                            category: 'transport',
                            time: '10:00',
                            cost: 2500,
                            mapUrl: 'Narita Airport',
                            note: '買 Suica 卡',
                            transportDetail: 'N-EX',
                            transportTime: 60,
                            transportType: 'transit',
                        },
                        {
                            id: 'l2',
                            name: '東京車站',
                            category: 'hotel',
                            time: '12:00',
                            cost: 0,
                            mapUrl: 'Tokyo Station',
                            note: '置物櫃寄放行李',
                            transportDetail: '步行',
                            transportTime: 10,
                            transportType: 'walking',
                        },
                        {
                            id: 'l3',
                            name: '淺草寺',
                            category: 'attraction',
                            time: '14:30',
                            cost: 0,
                            mapUrl: 'Senso-ji',
                            note: '抽籤、吃小吃',
                            transportDetail: '地鐵',
                            transportTime: 15,
                            transportType: 'transit',
                        }
                    ]
                }
            ]);

            // 備用行程列表
            const [backupLocations, setBackupLocations] = useState(() => _sharedData?.backupLocations || [
                {
                    id: 'b1',
                    name: '晴空塔',
                    category: 'attraction',
                    time: '',
                    cost: 0,
                    mapUrl: 'Tokyo Skytree',
                    note: '如果有時間可以去看看夜景',
                    transportDetail: '',
                    transportTime: 0,
                    transportType: 'transit',
                    isBackup: true
                }
            ]);



            const addDay = () => {
                const newDayNumber = itinerary.length + 1;
                let nextYear, nextMonth, nextDate, nextWeek;

                if (itinerary.length > 0) {
                    const lastDay = itinerary[itinerary.length - 1];
                    const monthNum = parseInt(lastDay.month);
                    if (!isNaN(monthNum) && lastDay.year && lastDay.date) {
                        const d = new Date(lastDay.year, monthNum - 1, parseInt(lastDay.date));
                        d.setDate(d.getDate() + 1);
                        nextYear = d.getFullYear();
                        nextMonth = `${d.getMonth() + 1}月`;
                        nextDate = d.getDate();
                        const weeks = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
                        nextWeek = weeks[d.getDay()];
                    } else {
                        const info = getDayInfo(newDayNumber);
                        nextYear = info.year; nextMonth = info.month; nextDate = info.date; nextWeek = info.week;
                    }
                } else {
                    const info = getDayInfo(1);
                    nextYear = info.year; nextMonth = info.month; nextDate = info.date; nextWeek = info.week;
                }

                setItinerary([...itinerary, {
                    id: 'd' + Date.now(),
                    day: newDayNumber,
                    year: nextYear,
                    month: nextMonth,
                    date: nextDate,
                    week: nextWeek,
                    locations: []
                }]);
                setSelectedDay(newDayNumber);
            };

            const removeDay = (dayId, e) => {
                e.stopPropagation();
                if (itinerary.length <= 1) return;
                const newItinerary = itinerary
                    .filter(d => d.id !== dayId)
                    .map((d, index) => ({ ...d, day: index + 1 }));
                setItinerary(newItinerary);
                if (selectedDay > newItinerary.length) setSelectedDay(newItinerary.length);
            };

            const currentDayData = useMemo(() =>
                itinerary.find(d => d.day === selectedDay) || itinerary[0],
                [itinerary, selectedDay]);

            const handleReorder = (newLocations) => {
                setItinerary(prev => prev.map(d =>
                    d.day === selectedDay ? { ...d, locations: newLocations } : d
                ));
            };

            const totalTripCost = useMemo(() => {
                return itinerary.reduce((acc, day) => {
                    return acc + day.locations.reduce((daySum, loc) => daySum + (Number(loc.cost) || 0), 0);
                }, 0);
            }, [itinerary]);

            const getDirectionsUrl = (origin, destination, mode = 'transit') => {
                if (!origin || !destination) return '#';
                const travelMode = mode === 'transit' ? 'r' : mode === 'walking' ? 'w' : mode === 'driving' ? 'd' : mode === 'bicycling' ? 'b' : 'r';
                return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&travelmode=${travelMode}`;
            };

            const updateDayInfo = (dayId, field, value) => {
                setItinerary(prev => prev.map(d =>
                    d.id === dayId ? { ...d, [field]: value } : d
                ));
            };

            const updateLocation = (id, field, value) => {
                setItinerary(prev => {
                    const newItinerary = [...prev];
                    const dayIndex = newItinerary.findIndex(d => d.day === selectedDay);
                    if (dayIndex === -1) return prev;
                    const newLocations = newItinerary[dayIndex].locations.map(loc =>
                        loc.id === id ? { ...loc, [field]: value } : loc
                    );
                    newItinerary[dayIndex] = { ...newItinerary[dayIndex], locations: newLocations };
                    return newItinerary;
                });
            };

            const removeLocation = (id) => {
                setItinerary(prev => prev.map(d => d.day === selectedDay ? {
                    ...d,
                    locations: d.locations.filter(l => l.id !== id)
                } : d));
            };

            const addNewLocation = () => {
                const newLoc = {
                    id: 'l' + Date.now(),
                    name: '',
                    category: activeTab === 'budget' ? 'other' : 'attraction',
                    time: '12:00',
                    cost: 0,
                    mapUrl: '',
                    note: '',
                    transportTime: 15,
                    transportType: 'transit',
                    transportDetail: ''
                };
                setItinerary(prev => prev.map(d => d.day === selectedDay ? { ...d, locations: [...d.locations, newLoc] } : d));
            };

            // 備用行程相關函數
            const updateBackupLocation = (id, field, value) => {
                setBackupLocations(prev => prev.map(loc => loc.id === id ? { ...loc, [field]: value } : loc));
            };

            const removeBackupLocation = (id) => {
                setBackupLocations(prev => prev.filter(loc => loc.id !== id));
            };

            const addNewBackupLocation = () => {
                const newLoc = {
                    id: 'b' + Date.now(),
                    name: '',
                    category: 'attraction',
                    time: '',
                    cost: 0,
                    mapUrl: '',
                    note: '',
                    transportTime: 15,
                    transportType: 'transit',
                    transportDetail: '',
                    isBackup: true
                };
                setBackupLocations([...backupLocations, newLoc]);
            };

            const moveToMainItinerary = (backupLoc) => {
                setItinerary(prev => prev.map(d => {
                    if (d.day === selectedDay) {
                        return {

                    }
                    return d;

            const DateEditModal = () => {
                if (!editingDayId) return null;
                const targetDay = itinerary.find(d => d.id === editingDayId);
                if (!targetDay) return null;
                const info = getDayInfo(targetDay.day);

                const parseNum = (str) => {
                    if (!str) return '';
                    const match = String(str).match(/\d+/);
                    return match ? match[0] : '';
                };

                const initialYear = targetDay.year !== undefined ? targetDay.year : info.year;
                const initialMonth = parseNum(targetDay.month !== undefined ? targetDay.month : info.month);
                const initialDate = parseNum(targetDay.date !== undefined ? targetDay.date : info.date);

                const [tempYear, setTempYear] = useState(initialYear);
                const [tempMonth, setTempMonth] = useState(initialMonth);
                const [tempDate, setTempDate] = useState(initialDate);

                const handleSave = () => {
                    const finalYear = tempYear || new Date().getFullYear();
                    const finalMonth = tempMonth ? `${tempMonth}月` : '';
                    const finalDate = tempDate || '';

                    const weeks = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];

                    setItinerary(prev => {
                        const targetIndex = prev.findIndex(d => d.id === editingDayId);
                        if (targetIndex === -1) return prev;

                        let baseDate = null;
                        if (finalYear && tempMonth && tempDate) {
                            baseDate = new Date(finalYear, tempMonth - 1, tempDate);
                        }

                        const newItinerary = [...prev];

                        if (baseDate) {
                            for (let i = 0; i < newItinerary.length; i++) {
                                const d = new Date(baseDate);
                                d.setDate(d.getDate() + (i - targetIndex));

                                newItinerary[i] = {
                                    ...newItinerary[i],
                                    year: d.getFullYear(),
                                    month: `${d.getMonth() + 1}月`,
                                    date: d.getDate(),
                                    week: weeks[d.getDay()]
                                };
                            }
                        } else {
                            newItinerary[targetIndex] = {
                                ...newItinerary[targetIndex],
                                year: finalYear,
                                month: finalMonth,
                                date: finalDate,
                                week: ''
                            };
                        }

                        return newItinerary;
                    });

                    setEditingDayId(null);
                };

                return (

                                        inputMode="numeric"

                                        value={tempYear}
                                        onChange={e => setTempYear(e.target.value)}

                                    />
                                </div>
                                <div>
                                    <label className="text-[11px] font-bold text-slate-500 mb-1.5 block">月份</label>

                                            inputMode="numeric"
                                            min="1" max="12"
                                            className="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all pr-8"
                                            value={tempMonth}
                                            onChange={e => setTempMonth(e.target.value)}

                            </div>
                        </div>
                    </div>
                );
            };

            // 滾輪選擇器元件
            const WheelPicker = ({ items, value, onChange }) => {
                const ITEM_H = 44;
                const VISIBLE = 5;
                const currentIndex = items.indexOf(value);
                const [offset, setOffset] = useState(0);
                const startY = useRef(null);
                const startOffset = useRef(0);
                const containerRef = useRef(null);

                const clamp = (idx) => Math.max(0, Math.min(items.length - 1, idx));

                const commit = (finalOffset) => {
                    const moved = Math.round(-finalOffset / ITEM_H);
                    const next = clamp(currentIndex + moved);
                    onChange(items[next]);
                    setOffset(0);
                };

                const onTouchStart = (e) => {
                    startY.current = e.touches[0].clientY;
                    startOffset.current = offset;
                };
                const onTouchMove = (e) => {
                    e.stopPropagation();
                    const dy = e.touches[0].clientY - startY.current;
                    const raw = startOffset.current + dy;
                    const max = currentIndex * ITEM_H;
                    const min = -(items.length - 1 - currentIndex) * ITEM_H;
                    setOffset(Math.max(min - ITEM_H, Math.min(max + ITEM_H, raw)));
                };
                const onTouchEnd = () => commit(offset);

                // Mouse support for desktop
                const mouseDown = useRef(false);
                const onMouseDown = (e) => {
                    mouseDown.current = true;
                    startY.current = e.clientY;
                    startOffset.current = offset;
                };
                const onMouseMove = (e) => {
                    if (!mouseDown.current) return;
                    const dy = e.clientY - startY.current;
                    const raw = startOffset.current + dy;
                    const max = currentIndex * ITEM_H;
                    const min = -(items.length - 1 - currentIndex) * ITEM_H;
                    setOffset(Math.max(min - ITEM_H, Math.min(max + ITEM_H, raw)));
                };
                const onMouseUp = () => { if (mouseDown.current) { mouseDown.current = false; commit(offset); } };

                return (
                    <div
                        ref={containerRef}
                        className="relative overflow-hidden select-none"
                        style={{ height: ITEM_H * VISIBLE }}
                        onTouchStart={onTouchStart}
                        onTouchMove={onTouchMove}
                        onTouchEnd={onTouchEnd}
                        onMouseDown={onMouseDown}
                        onMouseMove={onMouseMove}
                        onMouseUp={onMouseUp}
                        onMouseLeave={onMouseUp}
                    >
                        {/* 選中框 (最底層) */}
                        <div className="absolute left-0 right-0 pointer-events-none z-10" style={{ top: ITEM_H * Math.floor(VISIBLE / 2), height: ITEM_H }}>
                            <div className="h-full mx-2 rounded-2xl bg-slate-100"></div>
                        </div>
                        {/* 清單 (中間層，蓋過選中框) */}
                        <div
                            className="absolute w-full z-20"
                            style={{ top: ITEM_H * Math.floor(VISIBLE / 2) - currentIndex * ITEM_H + offset, transition: offset === 0 ? 'top 0.2s ease' : 'none' }}
                        >
                            {items.map((item, i) => {
                                const dist = Math.abs(i - currentIndex);
                                const opacity = dist === 0 ? 1 : dist === 1 ? 0.5 : 0.2;
                                const scale = dist === 0 ? 1 : 0.85;
                                return (
                                    <div
                                        key={item}
                                        className="flex items-center justify-center font-black text-slate-900 cursor-pointer"
                                        style={{ height: ITEM_H, fontSize: dist === 0 ? '1.75rem' : '1.1rem', opacity, transform: `scale(${scale})`, transition: 'opacity 0.1s, transform 0.1s' }}
                                        onClick={() => onChange(item)}
                                    >
                                        {item}
                                    </div>
                                );
                            })}
                        </div>
                        {/* 上下漸層遮罩 (最頂層，pointer-events-none 不擋點擊) */}
                        <div className="absolute inset-0 pointer-events-none z-30" style={{ background: 'linear-gradient(to bottom, white 0%, transparent 30%, transparent 70%, white 100%)' }}></div>
                    </div>
                );
            };

            const TransportTimeModal = () => {
                if (!editingTransportTarget) return null;

                const loc = currentDayData.locations.find(l => l.id === editingTransportTarget.id);
                const initial = loc ? (Number(loc.transportTime) || 15) : 15;

                // 1–120 分鐘
                const transportMinutes = Array.from({ length: 120 }, (_, i) => String(i + 1).padStart(2, '0'));

                            <div className="text-center">
                                <h3 className="text-base font-black text-slate-800">交通時間</h3>
                                <p className="text-[10px] font-bold text-slate-400 mt-0.5">上下滑動選擇所需時間（分鐘）</p>
                            </div>

                            <div className="flex items-center justify-center gap-3">
                                <div className="w-28">
                                    <WheelPicker items={transportMinutes} value={tempMin} onChange={setTempMin} />
                                </div>
                                <span className="text-base font-black text-slate-400">分鐘</span>
                            </div>

                            <div className="flex gap-3">
                                <button onClick={() => setEditingTransportTarget(null)} className="flex-1 py-3.5 rounded-2xl font-bold text-slate-500 bg-slate-100 active:scale-95 transition-all">取消</button>
                                <button onClick={handleSave} className="flex-1 py-3.5 rounded-2xl font-black text-white bg-slate-900 hover:bg-black shadow-lg active:scale-95 transition-all">確認</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const TimeEditModal = () => {
                if (!editingTimeTarget) return null;
                
                let initialTime = '';
                if (editingTimeTarget.isBackup) {
                    const loc = backupLocations.find(l => l.id === editingTimeTarget.id);
                    initialTime = loc ? loc.time : '';
                } else {
                    const loc = currentDayData.locations.find(l => l.id === editingTimeTarget.id);
                    initialTime = loc ? loc.time : '';
                }
                
                const timeParts = (initialTime || '12:00').split(':');
                const [tempH, setTempH] = useState(timeParts[0] || '12');
                const originalM = parseInt(timeParts[1] || '00');
                const roundedM = String(Math.round(originalM / 5) * 5).padStart(2, '0');
                const [tempM, setTempM] = useState(roundedM === '60' ? '55' : roundedM);

                const hours = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0'));
                const minutes = Array.from({ length: 12 }, (_, i) => String(i * 5).padStart(2, '0'));

                const handleSave = () => {
                    const finalTime = `${tempH}:${tempM}`;
                    if (editingTimeTarget.isBackup) {
                        updateBackupLocation(editingTimeTarget.id, 'time', finalTime);
                    } else {
                        updateLocation(editingTimeTarget.id, 'time', finalTime);
                    }
                    setEditingTimeTarget(null);
                };

                return (
                    <div 
                        className="fixed inset-0 z-[200] flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-md animate-in"
                        style={{ touchAction: 'none' }}
                    >
                        <div className="absolute inset-0" onClick={() => setEditingTimeTarget(null)} />
                        <div className="relative bg-white w-full max-w-sm rounded-t-[2.5rem] sm:rounded-[2.5rem] pt-4 pb-10 sm:pb-6 px-6 shadow-2xl flex flex-col gap-4">
                            <div className="w-10 h-1 bg-slate-200 rounded-full mx-auto sm:hidden"></div>
                            <div className="text-center">
                                <h3 className="text-base font-black text-slate-800">設定時間</h3>
                                <p className="text-[10px] font-bold text-slate-400 mt-0.5">上下滑動選擇時間</p>
                            </div>
                            
                            <div className="flex items-center justify-center gap-2">
                                <div className="flex-1">
                                    <WheelPicker items={hours} value={tempH} onChange={setTempH} />
                                </div>
                                <span className="text-3xl font-black text-slate-300 pb-1">:</span>
                                <div className="flex-1">
                                    <WheelPicker items={minutes} value={tempM} onChange={setTempM} />
                                </div>
                            </div>
                            
                            <div className="flex gap-3">
                                <button onClick={() => setEditingTimeTarget(null)} className="flex-1 py-3.5 rounded-2xl font-bold text-slate-500 bg-slate-100 active:scale-95 transition-all">取消</button>
                                <button onClick={handleSave} className="flex-1 py-3.5 rounded-2xl font-black text-white bg-slate-900 hover:bg-black shadow-lg active:scale-95 transition-all">確認</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen content-padding">
                    {/* Header */}
                    <header className={`sticky top-0 z-50 transition-all ${isScrolled ? 'glass-nav border-b border-slate-100 shadow-sm' : 'bg-white'}`}>
                        <div className="max-w-xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center">
                            <div className="flex flex-col items-start w-full mr-4">
                                <span className="text-[9px] font-black text-indigo-500 uppercase tracking-widest mb-0.5">My Trip</span>
                                <input
                                    value={tripTitle}
                                    onChange={(e) => setTripTitle(e.target.value)}
                                    className="text-lg sm:text-xl font-black bg-transparent border-none p-0 focus:ring-0 text-slate-800 w-full"
                                    placeholder="旅行名稱..."
                                />
                            </div>
                            <button 
                                onClick={handleShare}
                                className="p-2 text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-all active:scale-90"
                            >
                                <Icon name="share-2" className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="max-w-xl mx-auto px-4 sm:px-6 pb-4 flex items-center gap-3.5 overflow-x-auto scrollbar-hide py-2">
                            {itinerary.map(d => {
                                const info = getDayInfo(d.day);
                                const isActive = selectedDay === d.day;
                                return (
                                    <div key={d.id} className="relative group shrink-0">
                                        <div
                                            onClick={() => {

                                            className={`cursor-pointer flex flex-col items-center justify-center min-w-[65px] sm:min-w-[75px] py-2.5 sm:py-3 rounded-[1.25rem] transition-all border ${isActive ? 'bg-slate-900 border-slate-900 text-white shadow-lg shadow-slate-200 translate-y-[-2px]' : 'bg-white border-slate-100 text-slate-400 hover:border-slate-300'}`}
                                        >

                            <button onClick={addDay} className="flex items-center justify-center min-w-[48px] h-[72px] sm:h-[78px] rounded-[1.25rem] border-2 border-dashed border-slate-200 text-slate-300 hover:bg-slate-50 hover:border-slate-300 transition-all">
                                <Icon name="plus" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-4 sm:px-6 mt-6">
                        {activeTab === 'itinerary' && (
                            <div className="relative animate-in">

                                {itinerarySubTab === 'main' ? (

                                                                <button 
                                                                    onClick={() => setEditingTimeTarget({ id: loc.id, isBackup: true })}
                                                                    className="w-full bg-white h-5 rounded-full mt-2 shadow-sm border border-slate-100 hover:border-indigo-200 transition-all text-center flex items-center justify-center"
                                                                >
                                                                    <span className="text-[9px] font-black text-slate-500 leading-none">
                                                                        {loc.time || '--:--'}
                                                                    </span>
                                                                </button>
                                                                {isDropdownOpen && (
                                                                    <CategoryDropdown
                                                                        currentId={loc.category}
                                                                        onSelect={(val) => updateBackupLocation(loc.id, 'category', val)}
                                                                        onClose={() => setOpenDropdownId(null)}
                                                                    />
                                                                )}
                                                            </div>

                                                            <div className="flex-1 min-w-0">
                                                                <div className="flex justify-between items-start gap-2 mb-2">
                                                                    <div className="flex-1">
                                                                        <input
                                                                            className="text-base sm:text-lg font-black bg-transparent border-none p-0 focus:ring-0 text-slate-800 w-full mb-0.5"
                                                                            value={loc.name}
                                                                            placeholder="備用景點名稱..."
                                                                            onChange={(e) => updateBackupLocation(loc.id, 'name', e.target.value)}
                                                                        />
                                                                        <div className="flex items-center gap-1.5 text-[10px] text-slate-400 font-bold">
                                                                            <Icon name="tag" className="w-3 h-3" />
                                                                            <span>{cat.label}</span>
                                                                        </div>
                                                                    </div>
                                                                    <button onClick={() => removeBackupLocation(loc.id)} className="text-slate-200 hover:text-rose-500 p-1.5 transition-colors">
                                                                        <Icon name="trash-2" className="w-4 h-4" />
                                                                    </button>
                                                                </div>

                                                                <div className="space-y-2 mb-4">
                                                                    <div className="flex items-center gap-2 text-[11px] text-slate-500 bg-slate-50 rounded-xl px-3 py-2 border border-slate-100">
                                                                        <Icon name="map-pin" className="w-3 h-3 text-slate-400 shrink-0" />
                                                                        <input className="bg-transparent border-none p-0 focus:ring-0 w-full font-medium" value={loc.mapUrl} placeholder="Google Map 連結..." onChange={(e) => updateBackupLocation(loc.id, 'mapUrl', e.target.value)} />
                                                                    </div>
                                                                    {loc.note !== undefined && (
                                                                        <div className="flex items-start gap-2 text-[11px] text-slate-400 bg-amber-50/20 rounded-xl px-3 py-2 border border-amber-100/30">
                                                                            <Icon name="sticky-note" className="w-3 h-3 text-amber-500 mt-0.5 shrink-0" />
                                                                            <textarea className="bg-transparent border-none p-0 focus:ring-0 w-full resize-none font-medium" rows="1" value={loc.note} placeholder="備註..." onChange={(e) => updateBackupLocation(loc.id, 'note', e.target.value)} />
                                                                        </div>
                                                                    )}
                                                                </div>

                                                                {/* 加入按鈕 */}
                                                                <button
                                                                    onClick={() => moveToMainItinerary(loc)}
                                                                    className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-indigo-50 text-indigo-600 font-bold text-[12px] hover:bg-indigo-600 hover:text-white transition-all active:scale-[0.98]"
                                                                >
                                                                    <Icon name="calendar-plus" className="w-4 h-4" />
                                                                    加入第 {selectedDay} 天
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}

                                        <button
                                            onClick={addNewBackupLocation}
                                            className="add-card-btn w-full py-5 rounded-[1.5rem] border-2 border-dashed border-slate-200 flex items-center justify-center gap-2 group transition-all"
                                        >
                                            <div className="w-8 h-8 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                                <Icon name="plus" className="w-4 h-4" />
                                            </div>
                                            <span className="text-[11px] font-black text-slate-400 group-hover:text-indigo-600">新增備用行程</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'map' && (() => {
                            const allMapLocations = [...currentDayData.locations, ...backupLocations];
                            const currentIframeLocation = allMapLocations.find(l => l.id === focusedLocationId) || allMapLocations[0];

                            return (
                                <div className="animate-in space-y-4">
                                    <div className="bg-white rounded-[2rem] overflow-hidden border border-slate-100 shadow-xl h-[50vh] sm:h-[55vh] relative">
                                        <iframe width="100%" height="100%" frameBorder="0" loading="lazy" src={`https://maps.google.com/maps?q=${encodeURIComponent(currentIframeLocation?.mapUrl || 'Tokyo')}&output=embed`}></iframe>
                                    </div>
                                    <div className="flex items-center gap-3 overflow-x-auto scrollbar-hide py-4 px-1">

                                        {/* 當天行程列表 */}
                                        {currentDayData.locations.map((loc, index) => {
                                            const cat = categories.find(c => c.id === loc.category) || categories[5];
                                            const isFocused = focusedLocationId === loc.id;
                                            const nextLoc = currentDayData.locations[index + 1];
                                            return (
                                                <React.Fragment key={loc.id}>
                                                    <button
                                                        onClick={() => setFocusedLocationId(loc.id)}
                                                        className={`shrink-0 flex items-center gap-3 p-3 rounded-2xl border transition-all ${isFocused ? 'bg-slate-900 text-white border-slate-900 scale-105 shadow-md' : 'bg-white border-slate-100'}`}
                                                    >
                                                        <div className={`w-9 h-9 rounded-xl ${cat.bg} ${cat.text} flex items-center justify-center shrink-0 shadow-sm`}>
                                                            <Icon name={cat.icon} className="w-4 h-4" />
                                                        </div>
                                                        <div className="text-left min-w-[60px]">
                                                            <p className={`text-[8px] font-black ${isFocused ? 'text-white/60' : 'text-slate-400'}`}>{loc.time}</p>
                                                            <p className="text-[11px] font-black truncate max-w-[80px]">{loc.name || '未命名地點'}</p>
                                                        </div>
                                                    </button>
                                                    {nextLoc && (
                                                        <div className="shrink-0 flex flex-col items-center justify-center gap-1">
                                                            <div className="w-6 h-[2px] bg-slate-200"></div>
                                                            <a href={getDirectionsUrl(loc.mapUrl, nextLoc.mapUrl, loc.transportType)} target="_blank" rel="noopener noreferrer" className="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-100 transition-colors shadow-sm">
                                                                <Icon name="arrow-right" className="w-3.5 h-3.5" />
                                                            </a>
                                                            <div className="w-6 h-[2px] bg-slate-200"></div>
                                                        </div>
                                                    )}
                                                </React.Fragment>
                                            );
                                        })}

                                        {/* 分隔線與備用行程 */}
                                        {backupLocations.length > 0 && (
                                            <>
                                                {currentDayData.locations.length > 0 && (
                                                    <div className="shrink-0 flex flex-col items-center justify-center px-2">
                                                        <div className="h-10 w-[2px] bg-slate-200 rounded-full"></div>
                                                    </div>
                                                )}

                                                <div className="shrink-0 flex items-center justify-center px-1">
                                                    <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase writing-vertical-lr" style={{ writingMode: 'vertical-lr' }}>備用行程</span>
                                                </div>

                                                {backupLocations.map((loc) => {
                                                    const cat = categories.find(c => c.id === loc.category) || categories[5];
                                                    const isFocused = focusedLocationId === loc.id;
                                                    return (
                                                        <button
                                                            key={loc.id}
                                                            onClick={() => setFocusedLocationId(loc.id)}
                                                            className={`shrink-0 flex items-center gap-3 p-3 rounded-2xl border border-dashed transition-all ${isFocused ? 'bg-indigo-50 border-indigo-300 scale-105 shadow-md' : 'bg-white border-slate-200 opacity-70 hover:opacity-100'}`}
                                                        >
                                                            <div className={`w-9 h-9 rounded-xl ${cat.bg} ${cat.text} flex items-center justify-center shrink-0 shadow-sm opacity-80`}>
                                                                <Icon name={cat.icon} className="w-4 h-4" />
                                                            </div>
                                                            <div className="text-left min-w-[60px]">
                                                                <p className={`text-[8px] font-black ${isFocused ? 'text-indigo-400' : 'text-slate-400'}`}>備用</p>
                                                                <p className="text-[11px] font-black text-slate-700 truncate max-w-[80px]">{loc.name || '未命名地點'}</p>
                                                            </div>
                                                        </button>
                                                    );
                                                })}
                                            </>
                                        )}
                                    </div>
                                </div>
                            );
                        })()}

                        {activeTab === 'budget' && (
                            <div className="animate-in space-y-6 pb-20">
                                <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-48 h-48 bg-indigo-500/20 blur-[80px]"></div>
                                    <div className="relative z-10">
                                        <p className="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-2">當日支出統計</p>
                                        <h2 className="text-4xl sm:text-5xl font-black tracking-tight mb-6"><span className="text-lg text-slate-500 mr-1">$</span>{currentDayData.locations.reduce((sum, loc) => sum + (Number(loc.cost) || 0), 0).toLocaleString()}</h2>
                                        <div className="bg-white/5 border border-white/10 px-5 py-3 rounded-2xl flex justify-between items-center">
                                            <span className="text-[10px] font-black text-slate-400 uppercase">總支出累積</span>
                                            <span className="text-lg font-black">${totalTripCost.toLocaleString()}</span>
                                        </div>
                                    </div>
                                </div>

                                <h3 className="text-lg font-black text-slate-800 px-2">支出明細</h3>
                                <div className="space-y-3">
                                    {currentDayData.locations.map(loc => {
                                        const cat = categories.find(c => c.id === loc.category) || categories[5];
                                        const isDropdownOpen = openDropdownId === loc.id;
                                        return (
                                            <div key={loc.id} className="bg-white p-4 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm relative group">
                                                <div className="flex items-center gap-3 flex-1 min-w-0">
                                                    <div className="relative">
                                                        <button onClick={() => setOpenDropdownId(isDropdownOpen ? null : loc.id)} className={`w-11 h-11 rounded-xl ${cat.bg} ${cat.text} flex items-center justify-center shadow-sm active:scale-95 transition-all`}>
                                                            <Icon name={cat.icon} className="w-5 h-5" />
                                                        </button>
                                                        {isDropdownOpen && <CategoryDropdown currentId={loc.category} onSelect={(val) => updateLocation(loc.id, 'category', val)} onClose={() => setOpenDropdownId(null)} />}
                                                    </div>
                                                    <input className="font-black text-slate-800 text-sm sm:text-base bg-transparent border-none p-0 focus:ring-0 w-full truncate" value={loc.name} placeholder="支出項目" onChange={(e) => updateLocation(loc.id, 'name', e.target.value)} />
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="bg-slate-50 px-3 py-2 rounded-xl flex items-center border border-slate-100 w-24">
                                                        <span className="text-[10px] text-slate-400 font-bold mr-1">$</span>
                                                        <input type="number" className="w-full text-right bg-transparent border-none font-black text-slate-700 p-0 focus:ring-0 text-sm" value={loc.cost} onChange={(e) => updateLocation(loc.id, 'cost', e.target.value)} />
                                                    </div>
                                                    <button onClick={() => removeLocation(loc.id)} className="p-2 text-slate-200 hover:text-rose-500 transition-colors"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="mt-8 px-1">
                                    <button onClick={addNewLocation} className="add-card-btn w-full py-5 rounded-[1.5rem] border-2 border-dashed border-slate-200 flex items-center justify-center gap-3 group transition-all">
                                        <div className="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-inner">
                                            <Icon name="plus" className="w-4 h-4" />
                                        </div>
                                        <span className="text-xs font-black text-slate-400 group-hover:text-indigo-600">新增支出項目</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-6 sm:bottom-8 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-sm:max-w-[340px] max-w-sm">
                        <div className="bg-white/90 backdrop-blur-xl border border-slate-200 shadow-2xl px-1.5 py-1.5 flex items-center justify-around rounded-full">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex items-center gap-2 px-5 sm:px-6 py-3 rounded-full transition-all ${activeTab === 'itinerary' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>
                                <Icon name="navigation" className="w-4 h-4" />
                                {activeTab === 'itinerary' && <span className="text-xs font-black">行程</span>}
                            </button>
                            <button onClick={() => setActiveTab('map')} className={`flex items-center gap-2 px-5 sm:px-6 py-3 rounded-full transition-all ${activeTab === 'map' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>
                                <Icon name="map" className="w-4 h-4" />
                                {activeTab === 'map' && <span className="text-xs font-black">地圖</span>}
                            </button>
                            <button onClick={() => setActiveTab('budget')} className={`flex items-center gap-2 px-5 sm:px-6 py-3 rounded-full transition-all ${activeTab === 'budget' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>
                                <Icon name="wallet" className="w-4 h-4" />
                                {activeTab === 'budget' && <span className="text-xs font-black">支出</span>}
                            </button>
                        </div>
                    </nav>

                    <DateEditModal />
                    <TimeEditModal />
                    <TransportTimeModal />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
